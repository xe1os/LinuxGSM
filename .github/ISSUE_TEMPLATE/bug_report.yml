---
name: Bug Report
description: File a bug report
title: "[Bug]: "
labels: ["type: bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: Triage metadata used for prioritization.
      options:
        - "severity: low"
        - "severity: medium"
        - "severity: high"
        - "severity: critical"
    validations:
      required: true
  - type: dropdown
    id: reproducibility
    attributes:
      label: Reproducibility
      description: Triage metadata used for prioritization.
      options:
        - "reproducible: always"
        - "reproducible: sometimes"
        - "reproducible: unable"
    validations:
      required: true
  - type: dropdown
    id: regression
    attributes:
      label: Regression
      description: Triage metadata used for prioritization.
      options:
        - "regression: yes"
        - "regression: no"
        - "regression: unknown"
    validations:
      required: true
  - type: dropdown
    id: affects-latest
    attributes:
      label: Affects latest release
      description: Triage metadata used for prioritization.
      options:
        - "latest-release: yes"
        - "latest-release: no"
        - "latest-release: unknown"
    validations:
      required: true
  - type: input
    id: user-story
    attributes:
      label: User story
      description: As a [user description], I want [desired action] so that [desired outcome].
      placeholder: As a [user description], I want [desired action] so that [desired outcome].
    validations:
      required: true
  - type: input
    id: script-name
    attributes:
      label: Script name
      description: LinuxGSM script name in use.
      placeholder: vhserver
    validations:
      required: true
  - type: input
    id: game
    attributes:
      label: Game
      description: What game server are you hosting?
      placeholder: Valheim
    validations:
      required: true
  - type: dropdown
    id: distro
    attributes:
      label: Linux distro
      multiple: true
      options:
        - Ubuntu 26.04
        - Ubuntu 24.04
        - Ubuntu 22.04
        - Ubuntu 20.04
        - Debian 13
        - Debian 12
        - Debian 11
        - AlmaLinux 9
        - AlmaLinux 8
        - Rocky 10
        - Rocky 9
        - Rocky 8
        - RedHat 9
        - RedHat 8
        - Other
    validations:
      required: true
  - type: dropdown
    id: command
    attributes:
      label: Command
      multiple: true
      options:
        - "command: start"
        - "command: stop"
        - "command: restart"
        - "command: monitor"
        - "command: details"
        - "command: update"
        - "command: validate"
        - "command: backup"
        - "command: mods-install"
        - "command: mods-update"
        - "command: mods-remove"
        - "command: debug"
        - "command: console"
        - "command: install"
        - "command: auto-update"
        - "command: update-lgsm"
        - "command: wipe"
        - "command: send"
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What should happen?
      placeholder: Describe the expected result.
    validations:
      required: true
  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual behavior
      description: What actually happens?
      placeholder: Describe the observed result.
    validations:
      required: true
  - type: textarea
    id: further-info
    attributes:
      label: Further information
      description: A clear description of what the bug is, any ideas on how to resolve it and any further context that might be relevant to the issue.
      placeholder: Tell us what you see!
    validations:
      required: true
  - type: checkboxes
    id: prechecks
    attributes:
      label: Pre-checks
      description: Confirm standard troubleshooting has been completed.
      options:
        - label: I ran update and validate before reporting this issue.
          required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Include the exact command used and the full related output (debug/details if available). This will be automatically formatted into code.
      render: shell
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behaviour.
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
